name: Trigger ECS Deployment

on:
  workflow_run:
    workflows: ["Deploy to Each Account ECR"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials for Backend
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.BE_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BE_AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Force new deployment for Backend
        run: |
          aws ecs update-service \
            --cluster <vibr-be-cluster> \
            --service <vibr-be-service> \
            --force-new-deployment

      - name: Configure AWS credentials for Frontend (Account A)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.FE_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.FE_AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Force new deployment for Frontend
        run: |
          aws ecs update-service \
            --cluster <vibr-be-cluster> \
            --service <vibr-be-service> \
            --force-new-deployment