events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Docker 내장 DNS — 컨테이너 재배포로 IP가 바뀌어도 재해석
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name vibr.site www.vibr.site;

        # Let's Encrypt 인증서 발급/갱신 (webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name vibr.site www.vibr.site;

        ssl_certificate /etc/letsencrypt/live/vibr.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vibr.site/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # 프론트엔드
        location / {
            set $frontend "http://web:3001";
            proxy_pass $frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/youtube-search {
            set $frontend "http://web:3001";
            proxy_pass $frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 백엔드 API
        location /api {
            set $backend "http://api:3000";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
